services:
  auth-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ticket-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ticket
      POSTGRES_DB: ticket_db
    ports:
      - "5434:5432"
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secretcookie}
      HOME: /tmp
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  auth-service:
    build: ./auth-service
    restart: unless-stopped
    env_file:
      - ./auth-service/.env
    # Internal only — reachable via api-gateway or the docker network by
    # service name, not published to the host. Add back a "ports:" mapping
    # temporarily if you need to hit it directly while debugging.
    depends_on:
      auth-db:
        condition: service_healthy

  ticket-service:
    build: ./ticket-service
    restart: unless-stopped
    env_file:
      - ./ticket-service/.env
    # Internal only — reachable via api-gateway or the docker network by
    # service name, not published to the host.
    depends_on:
      ticket-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    restart: unless-stopped
    env_file:
      - ./notification-service/.env
    ports:
      - "8083:8083"
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    env_file:
      - ./api-gateway/.env
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - ticket-service

  # TLS-fronted alternative entry point — api-gateway's own :8080 mapping
  # above is untouched, so existing curl/dev workflows keep working
  # unchanged. See Caddyfile for the localhost -> real-domain swap note.
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      # Port 80 intentionally not published: local_certs (see Caddyfile)
      # doesn't need an ACME HTTP-01 challenge, so it's unused here. Add
      # "80:80" back once this runs behind a real domain with real
      # Let's Encrypt certs — Caddy needs it then for both the challenge
      # and the automatic http->https redirect.
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - auth-service
      - ticket-service
      - notification-service
      - api-gateway

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  auth_db_data:
  ticket_db_data:
  notification_db_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
